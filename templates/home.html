{% extends "base.html" %}
{% block content %}
<div class="card">
    <h1>Nature Nest Marketplace</h1>
    <p>Browse eco-friendly products from verified sellers.</p>
    <p>Products: <strong>{{ product_count }}</strong> | Sellers: <strong>{{ seller_count }}</strong></p>
    <div class="actions">
        <a href="{% url 'catalog:product_list' %}">Browse Products</a>
        {% if request.user.is_authenticated %}
            <a href="{% url 'accounts:dashboard' %}">Dashboard</a>
        {% else %}
            <a href="{% url 'accounts:login' %}">Login</a>
        {% endif %}
    </div>
</div>
{% endblock %}
