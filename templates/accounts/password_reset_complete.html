{% extends "base.html" %}
{% load static %}
{% block content %}
<style>
    .nn-signup-card { border: 1px solid #d8e3dd; border-radius: 1rem; overflow: hidden; background: #fff; box-shadow: 0 16px 34px rgba(15, 23, 42, .08); }
    .nn-signup-aside { position: relative; min-height: 220px; }
    .nn-signup-aside::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(7,72,39,.2) 0%, rgba(7,72,39,.78) 100%); }
    .nn-signup-aside-copy { position: relative; z-index: 1; padding: 2rem; color: #fff; display: grid; gap: .65rem; }
    .nn-signup-badge { display: inline-flex; align-items: center; width: fit-content; border-radius: .6rem; padding: .3rem .6rem; font-size: .74rem; font-weight: 700; }
    .nn-signup-badge-yellow { background: #facc15; color: #111827; }
    .nn-signup-badge-green { background: #dcfce7; color: #15803d; }
    .nn-signup-wrap { padding: 1.3rem; }
    .nn-signup-section { border: 1px solid #e3ebe7; border-radius: .75rem; padding: 1rem; background: #fcfefd; }
    .nn-action-link { display: inline-flex; align-items: center; justify-content: center; border-radius: .6rem; padding: .55rem .95rem; text-decoration: none; font-weight: 700; background: #16a34a; color: #fff; }
    .nn-action-link:hover { background: #15803d; color: #fff; }
    @media (max-width: 1023px) { .nn-signup-aside-copy { padding: 1.5rem; } }
</style>

<section class="mt-6 lg:mt-8">
    <div class="nn-signup-card grid grid-cols-1 lg:grid-cols-2">
        <div class="nn-signup-aside hidden lg:block" style="background: url('{% static "themes/user/images/banner/grocery-banner.png" %}') center/cover no-repeat;">
            <div class="nn-signup-aside-copy mt-16">
                <span class="nn-signup-badge nn-signup-badge-yellow">Security Update</span>
                <h1 class="text-3xl font-bold">Password Reset Complete</h1>
                <p class="text-sm text-green-50">Your password has been updated successfully.</p>
            </div>
        </div>
        <div class="nn-signup-wrap lg:p-8">
            <span class="nn-signup-badge nn-signup-badge-green">Success</span>
            <h2 class="text-2xl font-bold text-gray-900 mt-3">You Can Log In Now</h2>
            <div class="nn-signup-section mt-5">
                <p class="text-sm text-gray-700">Use your new password to sign in to your Nature Nest account.</p>
                <p class="mt-4">
                    <a href="{% url 'accounts:login' %}" class="nn-action-link">Go to Login</a>
                </p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
